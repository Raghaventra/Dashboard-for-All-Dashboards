{% extends "base.html" %}
{% block title %}Log in — HAYSTACK Ultimate Toolkit{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Log in</h1>
    <p class="muted">Access the HAYSTACK Ultimate Toolkit hub.</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/login" class="form">
      <label class="field">
        <span>Username</span>
        <input type="text" name="username" value="{{ username or '' }}" required autofocus />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" required />
      </label>
      <button class="btn btn-primary btn-block" type="submit">Log in</button>
    </form>

    <p class="auth-alt">No account yet? <a href="/register">Register</a></p>
  </div>
</div>
{% endblock %}
