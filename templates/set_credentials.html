{% extends "base.html" %}
{% block title %}Set credentials — Ultimate Dashboard{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Choose your login</h1>
    <p class="muted">Email <strong>{{ email }}</strong> verified. Set a username and password.</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/set-credentials" class="form">
      <input type="hidden" name="email" value="{{ email }}" />
      <label class="field">
        <span>Username</span>
        <input type="text" name="username" value="{{ username or '' }}" minlength="3" required autofocus />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" minlength="8" required />
        <small class="hint">At least 8 characters.</small>
      </label>
      <label class="field">
        <span>Confirm password</span>
        <input type="password" name="confirm_password" minlength="8" required />
      </label>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>
  </div>
</div>
{% endblock %}
