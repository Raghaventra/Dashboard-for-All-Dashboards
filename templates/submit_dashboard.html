{% extends "base.html" %}
{% block title %}Submit a dashboard — HAYSTACK Ultimate Toolkit{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px;">
    <h1>Submit a dashboard</h1>
    <p class="muted">It will appear in the Testing area until an admin approves it.</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/dashboards/submit" class="form">
      <label class="field">
        <span>Name *</span>
        <input name="name" value="{{ name or '' }}" required autofocus />
      </label>
      <label class="field">
        <span>Creator name</span>
        <input name="creator" value="{{ creator or '' }}" placeholder="Who made this tool?" />
        <small class="hint">Shown as "Created by" on the tile. Defaults to your username.</small>
      </label>
      <label class="field">
        <span>Link / URL *</span>
        <input name="url" type="url" value="{{ url or '' }}" placeholder="http://192.168.x.x:port" required />
      </label>
      <label class="field">
        <span>Icon</span>
        <input id="dash-icon" name="icon" value="{{ icon or '' }}" placeholder="🔗 emoji, or upload an image →" />
        <span class="icon-upload-row">
          <span class="icon-preview" id="dash-icon-preview-wrap">
            <span class="icon-preview-ph">Preview</span>
            <img id="dash-icon-preview" src="" alt="" style="display:none;" />
          </span>
          <label class="btn btn-ghost btn-small file-pick">
            Upload image
            <input type="file" accept="image/*" data-crop="dashboard"
                   data-target="#dash-icon" data-preview="#dash-icon-preview" hidden />
          </label>
        </span>
        <small class="hint">Use an emoji, or upload a square image (max {{ max_upload_mb }} MB).</small>
      </label>
      <label class="field">
        <span>Category</span>
        <input name="category" value="{{ category or '' }}" placeholder="General" />
      </label>
      <label class="field">
        <span>Description</span>
        <input name="description" value="{{ description or '' }}" />
      </label>
      <button class="btn btn-primary btn-block" type="submit">Submit for approval</button>
    </form>
  </div>
</div>
{% endblock %}
