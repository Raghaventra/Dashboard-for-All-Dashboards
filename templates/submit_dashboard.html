{% extends "base.html" %}
{% block title %}Submit a dashboard — Ultimate Dashboard{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px;">
    <h1>Submit a dashboard</h1>
    <p class="muted">It will appear in the Testing area until an admin approves it.</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/dashboards/submit" class="form">
      <label class="field">
        <span>Name *</span>
        <input name="name" value="{{ name or '' }}" required autofocus />
      </label>
      <label class="field">
        <span>Link / URL *</span>
        <input name="url" type="url" value="{{ url or '' }}" placeholder="http://192.168.x.x:port" required />
      </label>
      <label class="field">
        <span>Icon (emoji)</span>
        <input name="icon" value="{{ icon or '' }}" placeholder="🔗" />
      </label>
      <label class="field">
        <span>Category</span>
        <input name="category" value="{{ category or '' }}" placeholder="General" />
      </label>
      <label class="field">
        <span>Description</span>
        <input name="description" value="{{ description or '' }}" />
      </label>
      <button class="btn btn-primary btn-block" type="submit">Submit for approval</button>
    </form>
  </div>
</div>
{% endblock %}
